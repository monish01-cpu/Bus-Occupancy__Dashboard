<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEXAT Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
    </div>

    <main class="container">
        <header>
            <div class="logo-container">
                <img src="logo.jpg" alt="DEXAT Logo" class="app-logo">
                <h1>DEXAT</h1>
            </div>
            <p>Smart Occupancy Prediction Model</p>
        </header>

        <div class="dashboard-grid">
            <section class="card input-card">
                <h2>Journey Details</h2>
                <form id="predictionForm">
                    <div class="input-group">
                        <label for="route"><i class="fa-solid fa-route"></i> Route</label>
                        <select id="route" name="route" required>
                            <option value="" disabled selected>Select Route</option>
                            <option value="21G">Route 21G</option>
                            <option value="15B">Route 15B</option>
                            <option value="45A">Route 45A</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="stop"><i class="fa-solid fa-map-pin"></i> Bus Stop</label>
                        <select id="stop" name="stop" required>
                            <option value="" disabled selected>Select Stop</option>
                            <option value="Stop_01">Stop 01</option>
                            <option value="Stop_05">Stop 05</option>
                            <option value="Stop_12">Stop 12</option>
                            <option value="Stop_18">Stop 18</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="hour"><i class="fa-regular fa-clock"></i> Hour (24h)</label>
                        <select id="hour" name="hour" required>
                            <!-- Generated by JS -->
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="weekday"><i class="fa-regular fa-calendar"></i> Day Type</label>
                        <select id="weekday" name="weekday" required>
                            <option value="1">Weekday (Mon-Fri)</option>
                            <option value="0">Weekend (Sat-Sun)</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="weather"><i class="fa-solid fa-cloud-sun-rain"></i> Weather</label>
                        <select id="weather" name="weather" required>
                            <option value="normal">Normal</option>
                            <option value="rain">Rainy</option>
                        </select>
                    </div>

                    <button type="submit" id="predictBtn">
                        <span class="btn-text">Predict Occupancy</span>
                        <div class="loader hidden"></div>
                    </button>
                    <div id="error-message" class="hidden"></div>
                </form>
            </section>

            <section class="card result-card hidden" id="resultCard">
                <div class="result-header">
                    <h2>Prediction Analysis</h2>
                    <span class="status-badge" id="statusBadge">Checking...</span>
                </div>

                <div class="occupancy-meter">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path class="circle" id="occupancyCircle" stroke-dasharray="0, 100"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <text x="18" y="20.35" class="percentage" id="passengerCount">-</text>
                    </svg>
                    <div class="meter-label">Passengers Expected</div>
                </div>

                <div class="details-list">
                    <div class="detail-item">
                        <span class="label">Capacity</span>
                        <span class="value" id="totalSeats">-</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Crowd Level</span>
                        <span class="value" id="crowdLevel">-</span>
                    </div>
                </div>

                <div class="insight-box">
                    <i class="fa-solid fa-circle-info"></i>
                    <p id="explanationText">AI model insight will appear here.</p>
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
